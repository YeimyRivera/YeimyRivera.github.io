name: Hourly Space Map Update

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs at the top of every hour (UTC)
  workflow_dispatch:      # Allows you to run it manually to test

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 #

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' #

      - name: Install dependencies
        run: |
          pip install sunpy astropy plotly beautifulsoup4 #

      - name: Run script
        run: python generate_orbit_plot.py # Ensure this matches your filename

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add space_map.html
          git commit -m "Update spacecraft positions" || echo "No changes to commit"
          git push #
